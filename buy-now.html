<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCMN | Checkout</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="buy-now.css">
    <link rel="icon" href="images/favicon.jpg" type="image/x-icon">
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="HCMN Logo">
        </a>

        <div class="search">
            <img class="search-icon" src="images/search-icon.png" alt="Search Icon">
            <input type="text" placeholder="Search...">
        </div>

        <div class="header-icons">
            <a href="login.html">Log in</a>
            <a href="cart.html">Cart</a>
        </div>
    </header>

    <main class="checkout-page">
        <a href="shirts.html" class="back-link">← Back to collection</a>

        <section class="checkout-card">
            <div class="checkout-summary">
                <p class="eyebrow">Fast checkout</p>
                <h1>Complete your order</h1>

                <div class="product-preview">
                    <img id="checkoutImage" src="images/logo.png" alt="Selected product">
                    <div>
                        <h2 id="checkoutName">Selected item</h2>
                        <p id="checkoutDescription">Premium HCMN pick</p>
                        <p class="price" id="checkoutPrice">EGP 0</p>
                    </div>
                </div>

                <ul class="benefits">
                    <li>Secure delivery across Egypt</li>
                    <li>Free size guidance from our team</li>
                    <li>Quick support within 24 hours</li>
                </ul>
            </div>

            <form id="checkoutForm" class="checkout-form">
                <label>
                    Full name
                    <input type="text" id="customerName" name="customerName" placeholder="Ahmed Hassan" required>
                </label>

                <label>
                    Phone number
                    <input type="tel" id="phone" name="phone" placeholder="01012345678" required>
                </label>

                <label>
                    Delivery address
                    <textarea id="address" name="address" rows="3" placeholder="Enter your full address" required></textarea>
                </label>

                <label>
                    Select size
                    <select id="selectedSize" name="selectedSize" required>
                        <option value="" disabled selected>Choose your size</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                        <option value="XXL">XXL</option>
                    </select>
                </label>

                <label>
                    Notes
                    <textarea id="notes" name="notes" rows="2" placeholder="Any extra details?"></textarea>
                </label>

                <button type="submit">Place order</button>
                <p id="formMessage" class="form-message" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="buy-now.js"></script>
</body>
</html>
